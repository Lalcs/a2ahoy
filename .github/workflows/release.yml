name: Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.1"
          cache: true

      - name: Run tests
        run: go test ./...

  build-and-upload:
    name: Build (${{ matrix.goos }}/${{ matrix.goarch }})
    runs-on: ubuntu-latest
    needs: [test]
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            suffix: ""
          - goos: linux
            goarch: arm64
            suffix: ""
          - goos: darwin
            goarch: amd64
            suffix: ""
          - goos: darwin
            goarch: arm64
            suffix: ""
          - goos: windows
            goarch: amd64
            suffix: ".exe"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.1"
          cache: true

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          binary="a2ahoy-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.suffix }}"
          go build -o "$binary" .

      - name: Upload to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          binary="a2ahoy-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.suffix }}"
          gh release upload "${{ github.event.release.tag_name }}" "$binary"
